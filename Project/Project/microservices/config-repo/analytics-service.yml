server:
  port: 8087

spring:
  datasource:
    url: ${ANALYTICS_DB_URL:jdbc:mysql://localhost:3306/certifypro_analytics?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver

resilience4j:
  circuitbreaker:
    instances:
      exam-service:
        base-config: default
      result-service:
        base-config: default
      certificate-service:
        base-config: default
      candidate-service:
        base-config: default
