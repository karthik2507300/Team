spring.application.name=certifypro-backend

# ===== MySQL Datasource (values from .env) =====
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/certifypro?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===== JPA / Hibernate =====
# Flyway owns the schema; Hibernate neither creates nor validates it.
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ===== Flyway =====
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# ===== JWT =====
certifypro.jwt.secret=${JWT_SECRET:ChangeThisToAStrongRandomSecretKeyForCertifyProJWT2026!!}
certifypro.jwt.expiration-ms=${JWT_EXPIRY:86400000}
certifypro.jwt.refresh-secret=${REFRESH_SECRET:ChangeThisToAnotherStrongRandomRefreshSecretForCertifyPro2026!!}
certifypro.jwt.refresh-expiration-ms=${REFRESH_EXPIRY:604800000}

# ===== Server =====
server.port=${PORT:8081}
